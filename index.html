<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>QR test page</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body { font-family: sans-serif; margin: 24px; line-height: 1.4; }
    .warn { color: #b00020; font-weight: 600; }
    pre { background: #f5f5f5; padding: 12px; border-radius: 8px; overflow: auto; }
  </style>
</head>
<body>
  <h1>Rental QR test</h1>
  <div id="status">Loading…</div>
  <div id="warning"></div>
  <pre id="output"></pre>

  <script type="module">
    const statusEl = document.getElementById('status');
    const warningEl = document.getElementById('warning');
    const outputEl = document.getElementById('output');

    // TEST ONLY.
    // Должен совпадать с тем master key, которым шифровался QR.
    // Пример: 32 байта в hex.
    const MASTER_KEY_HEX = '00112233445566778899aabbccddeeff00112233445566778899aabbccddeeff';

    const QR_VERSION = 1;
    const IV_LENGTH = 12;
    const TAG_LENGTH = 16;
    const PAYLOAD_LENGTH_V1 = 14;
    const MINUTE_MS = 60 * 1000;
    const WARN_DIFF_MS = 60 * 60 * 1000;

    function hexToBytes(hex) {
      if (!/^[0-9a-fA-F]+$/.test(hex) || hex.length % 2 !== 0) {
        throw new Error('Invalid hex key');
      }
      const out = new Uint8Array(hex.length / 2);
      for (let i = 0; i < out.length; i++) {
        out[i] = parseInt(hex.slice(i * 2, i * 2 + 2), 16);
      }
      return out;
    }

    function base64UrlToBytes(s) {
      const b64 = s.replace(/-/g, '+').replace(/_/g, '/')
        + '='.repeat((4 - (s.length % 4)) % 4);
      const bin = atob(b64);
      const out = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
      return out;
    }

    function getBlobFromLocation() {
      const url = new URL(window.location.href);
      const q = url.searchParams.get('q');
      if (q) return q;

      const parts = url.pathname.split('/').filter(Boolean);
      if (parts.length) return parts[parts.length - 1];

      throw new Error('QR blob not found in URL');
    }

    function unpackContainer(bytes) {
      if (bytes.length < 2 + IV_LENGTH + TAG_LENGTH) {
        throw new Error('QR container is too short');
      }

      let offset = 0;
      const version = bytes[offset++];
      const serialLen = bytes[offset++];

      if (bytes.length < 2 + serialLen + IV_LENGTH + TAG_LENGTH) {
        throw new Error('Malformed QR container');
      }

      const serialBytes = bytes.slice(offset, offset + serialLen);
      offset += serialLen;

      const serial = new TextDecoder().decode(serialBytes);
      const iv = bytes.slice(offset, offset + IV_LENGTH);
      offset += IV_LENGTH;

      const tag = bytes.slice(offset, offset + TAG_LENGTH);
      offset += TAG_LENGTH;

      const ciphertext = bytes.slice(offset);

      return { version, serial, serialBytes, iv, tag, ciphertext };
    }

    function buildAad(version, serialBytes) {
      const out = new Uint8Array(2 + serialBytes.length);
      out[0] = version;
      out[1] = serialBytes.length;
      out.set(serialBytes, 2);
      return out;
    }

    async function deriveQrKey(masterKeyBytes, serial) {
      const enc = new TextEncoder();
      const hmacKey = await crypto.subtle.importKey(
        'raw',
        masterKeyBytes,
        { name: 'HMAC', hash: 'SHA-256' },
        false,
        ['sign']
      );

      const prefix = enc.encode('rental-qr:v1\0');
      const serialBytes = enc.encode(serial);
      const data = new Uint8Array(prefix.length + serialBytes.length);
      data.set(prefix, 0);
      data.set(serialBytes, prefix.length);

      const digest = new Uint8Array(await crypto.subtle.sign('HMAC', hmacKey, data));
      const aesKeyBytes = digest.slice(0, 32);

      return crypto.subtle.importKey(
        'raw',
        aesKeyBytes,
        { name: 'AES-GCM' },
        false,
        ['decrypt']
      );
    }

    function unpackPayload(buf) {
      if (buf.byteLength !== PAYLOAD_LENGTH_V1) {
        throw new Error(`Invalid payload length: ${buf.byteLength}`);
      }

      const dv = new DataView(buf);
      const seq = dv.getUint32(0, false);
      const walltimeMin = dv.getUint32(4, false);
      const shiftMin = dv.getInt32(8, false);
      const anomalyCount = dv.getUint16(12, false);

      return {
        seq,
        walltimeMin,
        walltimeMs: walltimeMin * MINUTE_MS,
        shiftMin,
        shiftMs: shiftMin * MINUTE_MS,
        anomalyCount,
      };
    }

    function formatDateTime(ms) {
      const d = new Date(ms);
      return d.toLocaleString(undefined, {
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        hour12: false,
      });
    }

    async function main() {
      const blobText = getBlobFromLocation();
      const blob = base64UrlToBytes(blobText);
      const { version, serial, serialBytes, iv, tag, ciphertext } = unpackContainer(blob);

      if (version !== QR_VERSION) {
        throw new Error(`Unsupported QR version: ${version}`);
      }

      const masterKeyBytes = hexToBytes(MASTER_KEY_HEX);
      const aesKey = await deriveQrKey(masterKeyBytes, serial);
      const aad = buildAad(version, serialBytes);

      // WebCrypto AES-GCM expects ciphertext || tag
      const encrypted = new Uint8Array(ciphertext.length + tag.length);
      encrypted.set(ciphertext, 0);
      encrypted.set(tag, ciphertext.length);

      const plaintext = await crypto.subtle.decrypt(
        {
          name: 'AES-GCM',
          iv,
          additionalData: aad,
          tagLength: 128,
        },
        aesKey,
        encrypted
      );

      const payload = unpackPayload(plaintext);

      const nowMs = Date.now();
      const diffMs = Math.abs(nowMs - payload.walltimeMs);

      statusEl.textContent = 'QR decrypted and authenticated successfully';

      if (diffMs > WARN_DIFF_MS) {
        warningEl.className = 'warn';
        warningEl.textContent =
          `Warning: device time differs from local browser time by more than 1 hour `
          + `(${Math.round(diffMs / 60000)} min).`;
      }

      outputEl.textContent = JSON.stringify({
        version,
        serial,
        payload: {
          ...payload,
          walltimeLocal: formatDateTime(payload.walltimeMs),
        },
        browserNowMs: nowMs,
        browserNowLocal: formatDateTime(nowMs),
        diffMin: Math.round(diffMs / 60000),
      }, null, 2);
    }

    main().catch((err) => {
      statusEl.textContent = 'Failed';
      warningEl.className = 'warn';
      warningEl.textContent = err?.message || String(err);
      outputEl.textContent = err?.stack || '';
      console.error(err);
    });
  </script>
</body>
</html>
